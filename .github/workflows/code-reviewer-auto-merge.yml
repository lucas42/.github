name: Auto-merge on code reviewer approval

on:
  workflow_call:
    secrets:
      CODE_REVIEWER_APP_ID:
        required: true
      CODE_REVIEWER_PRIVATE_KEY:
        required: true

permissions:
  contents: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Allow approvals from either lucos-code-reviewer[bot] or lucas42.
    # The step below validates which is expected for this repo based on
    # unsupervisedAgentCode from configy.
    if: |
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved' &&
      (
        (github.event.review.user.login == 'lucos-code-reviewer[bot]' && github.event.review.user.id == 264151378) ||
        (github.event.review.user.login == 'lucas42' && github.event.review.user.id == 428847)
      )
    steps:
      - name: Check unsupervisedAgentCode and validate reviewer
        id: check-reviewer
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          REVIEWER_LOGIN: ${{ github.event.review.user.login }}
        run: |
          # Fetch repo config from configy
          CONFIGY_RESPONSE=$(curl -sf "https://configy.l42.eu/repositories/${REPO_NAME}" -H "Accept: application/json" || echo '{}')
          UNSUPERVISED=$(echo "$CONFIGY_RESPONSE" | jq -r '.unsupervisedAgentCode // false')

          echo "unsupervisedAgentCode=${UNSUPERVISED}"

          if [ "$UNSUPERVISED" = "true" ]; then
            EXPECTED_REVIEWER="lucos-code-reviewer[bot]"
          else
            EXPECTED_REVIEWER="lucas42"
          fi

          if [ "$REVIEWER_LOGIN" != "$EXPECTED_REVIEWER" ]; then
            echo "Reviewer '${REVIEWER_LOGIN}' is not the expected reviewer '${EXPECTED_REVIEWER}' for this repo (unsupervisedAgentCode=${UNSUPERVISED}). Skipping auto-merge."
            exit 1
          fi

          echo "Reviewer '${REVIEWER_LOGIN}' matches expected reviewer for this repo. Proceeding with auto-merge."

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CODE_REVIEWER_APP_ID }}
          private-key: ${{ secrets.CODE_REVIEWER_PRIVATE_KEY }}
      # Use a GitHub App token instead of GITHUB_TOKEN because GITHUB_TOKEN
      # events don't trigger downstream workflows or side-effects.
      - name: Enable auto-merge
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  close-linked-issues:
    runs-on: ubuntu-latest
    # Only run when a PR is merged (not just closed) by lucos-code-reviewer[bot].
    # Login-only check (without numeric ID) is intentional here: the worst case
    # of a false trigger is closing an issue prematurely, which is recoverable
    # and does not grant any elevated access. The auto-merge job above (which
    # does grant write access) uses the full login + numeric ID check.
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.merged_by.login == 'lucos-code-reviewer[bot]'
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CODE_REVIEWER_APP_ID }}
          private-key: ${{ secrets.CODE_REVIEWER_PRIVATE_KEY }}
      # GitHub doesn't process closing keywords (e.g. "Closes #N") when a bot
      # merges a PR. Work around this by querying the closing references that
      # GitHub has already parsed and closing each issue via the API.
      - name: Close linked issues
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api graphql -f query='query {
            repository(owner: "${{ github.repository_owner }}", name: "${{ github.event.repository.name }}") {
              pullRequest(number: ${{ github.event.pull_request.number }}) {
                closingIssuesReferences(first: 10) {
                  nodes {
                    number
                    state
                  }
                }
              }
            }
          }' --jq '.data.repository.pullRequest.closingIssuesReferences.nodes[] | select(.state == "OPEN") | .number' | while read -r issue_number; do
            echo "Closing issue #$issue_number"
            gh api "repos/${{ github.repository }}/issues/$issue_number" \
              --method PATCH \
              -f state=closed \
              -f state_reason=completed
          done
