name: Mirror base images to GHCR

on:
  schedule:
    - cron: '0 4 * * 1'  # Weekly, Mondays at 04:00 UTC
  workflow_dispatch:

permissions:
  packages: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Install crane
        uses: imjasonh/setup-crane@31b88efe9de28ae0ffa220711af4b60be9435f6e  # v0.4

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror images
        run: |
          set -uo pipefail

          # All Docker Hub base images used across the lucos estate.
          # Update this list when a Dockerfile adds a new base image.
          # crane copy preserves multi-platform manifests — no extra pull steps needed.
          images=(
            # node
            "node:25-alpine"
            "node:25"
            "node:25-bookworm"
            "node:18-alpine"

            # python
            "python:3.15.0a8-alpine"
            "python:3.14.3-alpine"
            "python:3.14.2-alpine"
            "python:3.14-slim"
            "python:3.14"

            # go
            "golang:1.26"
            "golang:1.26-alpine"

            # ruby
            "ruby:3.3.6-alpine3.19"

            # php
            "php:8.5.5-apache-trixie"
            "php:8.5-apache"

            # nginx / apache httpd
            "nginx:1.29.8"
            "nginx:1.29.8-alpine"
            "nginx:1.29.8-alpine3.23"
            "nginx:1.29.4-alpine3.23"
            "nginx:alpine"
            "httpd:2.4-alpine"
            "httpd:2.4.66-alpine"

            # JVM
            "maven:3-eclipse-temurin-25-alpine"
            "eclipse-temurin:22-jdk-alpine"
            "erlang:28.4.2.0"
            "clojure:temurin-22-lein-2.11.2-bookworm-slim"
            "openjdk:22-jdk-slim"

            # rust
            "rust:1.94.1-alpine3.22"

            # alpine / debian / ubuntu base
            "alpine:latest"
            "alpine:3.23"
            "alpine:3.23.4"
            "alpine:3.21.1"
            "debian:trixie"
            "debian:trixie-slim"
            "ubuntu:focal"

            # messaging
            "eclipse-mosquitto:2.0.20"

            # third-party services
            "typesense/typesense:30.1"
            "hugomods/hugo:latest"
            "owntracks/frontend:2.15.3"

            # QEMU emulation (used by build-multiplatform orb job)
            "tonistiigi/binfmt:latest"
          )

          failed=()
          for image in "${images[@]}"; do
            dst="ghcr.io/lucas42/mirror/${image}"
            echo "Mirroring ${image} → ${dst}"
            if ! crane copy --platform=linux/amd64,linux/arm64 "${image}" "${dst}"; then
              echo "WARNING: Failed to mirror ${image}"
              failed+=("${image}")
            fi
          done

          if [ ${#failed[@]} -gt 0 ]; then
            echo "ERROR: Failed to mirror ${#failed[@]} image(s):"
            printf '  - %s\n' "${failed[@]}"
            exit 1
          fi
