name: Dependabot auto-merge

# This workflow will not merge without a GitHub App token.
# A GITHUB_TOKEN-attributed merge would suppress downstream push-triggered
# workflows including CodeQL, leaving main without analysis coverage.

on:
  workflow_call:
    secrets:
      LUCOS_CI_APP_ID:
        required: true
      LUCOS_CI_PRIVATE_KEY:
        required: true

permissions:
  contents: read

jobs:
  dependabot:
    runs-on: ubuntu-latest
    # Guard is here on the job, NOT in caller workflows.
    # Caller workflows must use the pull_request trigger (not pull_request_target)
    # and must NOT add an if: guard on the job that calls this reusable workflow.
    # Two reasons:
    # 1. pull_request_target + uses: causes startup_failure for non-Dependabot PRs,
    #    regardless of any if: guards (GitHub resolves uses: before evaluating if:).
    # 2. secrets: inherit also causes startup_failure on pull_request_target events.
    # Keeping the guard here means this job is simply skipped for non-Dependabot
    # PRs and the workflow concludes 'skipped' cleanly.
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.LUCOS_CI_APP_ID }}
          private-key: ${{ secrets.LUCOS_CI_PRIVATE_KEY }}
      - name: Enable auto-merge for Dependabot PRs
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
